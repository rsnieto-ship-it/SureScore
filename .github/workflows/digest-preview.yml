name: "Digest — Monday Preview"

on:
  schedule:
    # 13:00 UTC Monday = 8:00 AM CDT / 7:00 AM CST. GH Actions cron can
    # drift up to ~3 hours late, so the window gate below accepts hours
    # 7–11 CT.
    - cron: "0 13 * * 1"
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  preview:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: digest-script

    steps:
      - name: Check Central time is in morning window
        id: tz-check
        working-directory: .
        run: |
          CENTRAL_HOUR=$((10#$(TZ="America/Chicago" date +%H)))
          echo "Central time hour: $CENTRAL_HOUR"
          if [ "$CENTRAL_HOUR" -lt 7 ] || [ "$CENTRAL_HOUR" -gt 11 ]; then
            echo "Outside 7–11 CT window — skipping. Hour is $CENTRAL_HOUR."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.tz-check.outputs.skip != 'true'

      - uses: actions/setup-python@v5
        if: steps.tz-check.outputs.skip != 'true'
        with:
          python-version: "3.12"

      - name: Install dependencies
        if: steps.tz-check.outputs.skip != 'true'
        run: pip install -r requirements.txt

      - name: Run preview
        if: steps.tz-check.outputs.skip != 'true'
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_SES_REGION: ${{ secrets.AWS_SES_REGION }}
          DIGEST_RECIPIENTS: ${{ secrets.DIGEST_RECIPIENTS }}
          ROY_EMAIL: ${{ secrets.ROY_EMAIL }}
          UNSUBSCRIBE_SECRET: ${{ secrets.UNSUBSCRIBE_SECRET }}
          SITE_URL: ${{ secrets.SITE_URL }}
        run: python surescore_digest.py --preview

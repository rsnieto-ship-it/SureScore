name: "Digest — Monday Preview"

on:
  schedule:
    # Fire at both possible UTC times for 8:00 AM Central:
    # 13:00 UTC = 8:00 AM CDT (March–November)
    # 14:00 UTC = 8:00 AM CST (November–March)
    - cron: "0 13 * * 1"
    - cron: "0 14 * * 1"
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  preview:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: digest-script

    steps:
      - name: Check if it's 8 AM Central Time
        id: tz-check
        working-directory: .
        run: |
          CENTRAL_HOUR=$(TZ="America/Chicago" date +%H)
          echo "Central time hour: $CENTRAL_HOUR"
          if [ "$CENTRAL_HOUR" != "08" ]; then
            echo "Not 8 AM Central — skipping (DST mismatch). Hour is $CENTRAL_HOUR."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.tz-check.outputs.skip != 'true'

      - uses: actions/setup-python@v5
        if: steps.tz-check.outputs.skip != 'true'
        with:
          python-version: "3.12"

      - name: Install dependencies
        if: steps.tz-check.outputs.skip != 'true'
        run: pip install -r requirements.txt

      - name: Run preview
        if: steps.tz-check.outputs.skip != 'true'
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_SES_REGION: ${{ secrets.AWS_SES_REGION }}
          DIGEST_RECIPIENTS: ${{ secrets.DIGEST_RECIPIENTS }}
          ROY_EMAIL: ${{ secrets.ROY_EMAIL }}
          UNSUBSCRIBE_SECRET: ${{ secrets.UNSUBSCRIBE_SECRET }}
          SITE_URL: ${{ secrets.SITE_URL }}
        run: python surescore_digest.py --preview

name: "Digest — Tuesday Auto-Select Fallback"

on:
  schedule:
    # 11:00 UTC Tuesday = 6:00 AM CDT / 5:00 AM CST. GH Actions cron can
    # drift up to ~3 hours late, so the window gate below accepts hours
    # 5–9 CT. Auto-select is a no-op if Roy has already picked.
    - cron: "0 11 * * 2"
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  auto-select:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: digest-script

    steps:
      - name: Check Central time is in early-morning window
        id: tz-check
        working-directory: .
        run: |
          CENTRAL_HOUR=$((10#$(TZ="America/Chicago" date +%H)))
          echo "Central time hour: $CENTRAL_HOUR"
          if [ "$CENTRAL_HOUR" -lt 5 ] || [ "$CENTRAL_HOUR" -gt 9 ]; then
            echo "Outside 5–9 CT window — skipping. Hour is $CENTRAL_HOUR."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.tz-check.outputs.skip != 'true'

      - uses: actions/setup-python@v5
        if: steps.tz-check.outputs.skip != 'true'
        with:
          python-version: "3.12"

      - name: Install dependencies
        if: steps.tz-check.outputs.skip != 'true'
        run: pip install -r requirements.txt

      - name: Auto-select if no manual picks
        if: steps.tz-check.outputs.skip != 'true'
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_SES_REGION: ${{ secrets.AWS_SES_REGION }}
          DIGEST_RECIPIENTS: ${{ secrets.DIGEST_RECIPIENTS }}
          ROY_EMAIL: ${{ secrets.ROY_EMAIL }}
          UNSUBSCRIBE_SECRET: ${{ secrets.UNSUBSCRIBE_SECRET }}
          SITE_URL: ${{ secrets.SITE_URL }}
        run: python surescore_digest.py --auto-select
